<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gradient)" stroke-width="4"/>
  <!-- Inner pattern - representing memory/connections -->
  <circle cx="50" cy="30" r="8" fill="url(#gradient)"/>
  <circle cx="30" cy="60" r="6" fill="url(#gradient)"/>
  <circle cx="70" cy="60" r="6" fill="url(#gradient)"/>
  <circle cx="50" cy="70" r="4" fill="url(#gradient)"/>
  <!-- Connection lines -->
  <line x1="50" y1="38" x2="30" y2="54" stroke="url(#gradient)" stroke-width="2"/>
  <line x1="50" y1="38" x2="70" y2="54" stroke="url(#gradient)" stroke-width="2"/>
  <line x1="30" y1="60" x2="50" y2="70" stroke="url(#gradient)" stroke-width="2"/>
  <line x1="70" y1="60" x2="50" y2="70" stroke="url(#gradient)" stroke-width="2"/>
</svg>
